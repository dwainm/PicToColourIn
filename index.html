<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicToColourIn - Turn Photos into Coloring Pages</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>🎨 PicToColourIn</h1>
        <p>Turn any photo into a printable coloring page</p>
    </header>

    <main>
        <!-- Upload Section -->
        <section class="upload-section" id="uploadSection">
            <div class="drop-zone" id="dropZone">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p>Drag & drop your photo here</p>
                <p class="small">or click to browse</p>
                <input type="file" id="fileInput" accept="image/*" hidden>
            </div>
        </section>

        <!-- Editor Section -->
        <section class="editor-section" id="editorSection" style="display: none;">
            <div class="canvas-wrapper">
                <div class="canvas-container">
                    <canvas id="sourceCanvas" style="display: none;"></canvas>
                    <canvas id="outputCanvas"></canvas>
                </div>
                <div class="loading-overlay" id="loadingOverlay" style="display: none;">
                    <div class="spinner"></div>
                    <p>Processing...</p>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <div class="control-group">
                    <label for="blurSlider">Smoothing</label>
                    <input type="range" id="blurSlider" min="0" max="10" value="2" step="0.5">
                    <span class="value" id="blurValue">2</span>
                </div>

                <div class="control-group">
                    <label for="edgeSlider">Edge Sensitivity</label>
                    <input type="range" id="edgeSlider" min="0.1" max="2" value="0.5" step="0.1">
                    <span class="value" id="edgeValue">0.5</span>
                </div>

                <div class="control-group">
                    <label for="thresholdSlider">Threshold</label>
                    <input type="range" id="thresholdSlider" min="0" max="1" value="0.3" step="0.05">
                    <span class="value" id="thresholdValue">0.3</span>
                </div>

                <div class="control-group">
                    <label for="invertToggle">
                        <input type="checkbox" id="invertToggle">
                        Invert (white lines on black)
                    </label>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="actions">
                <button id="newImageBtn" class="btn secondary">New Image</button>
                <button id="downloadBtn" class="btn primary">Download PNG</button>
                <button id="pdfBtn" class="btn primary">Download PDF</button>
                <button id="printBtn" class="btn primary">Print</button>
            </div>
        </section>

        <!-- AdSense Placeholder -->
        <section class="ads-section">
            <p class="ads-label">Advertisement</p>
            <div class="ad-container">
                <!-- Google AdSense code will go here -->
                <div class="ad-placeholder">
                    <p>AdSpace - 728x90 or responsive</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2024 PicToColourIn.com - Made with 💜 for coloring enthusiasts</p>
    </footer>

    <script src="webgl-processor.js"></script>
    <script src="app.js"></script>
</body>
</html>
